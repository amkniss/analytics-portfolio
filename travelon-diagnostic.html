<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travelon Diagnostic | Redirecting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --dk-primary: #4074c5;
      --dk-navy: #02155a;
      --dk-blue: #127ddd;
      --dk-cyan: #30dbe7;
      --dk-white: #ffffff;
      --dk-light: #ecf0f1;
    }
    .audit-logo { max-height: 40px; width: auto; object-fit: contain; }
    @media (max-width: 640px) { .audit-logo { max-height: 32px; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
  <header class="sticky top-0 z-10 bg-white border-b border-slate-200">
    <nav class="max-w-5xl mx-auto px-4 sm:px-8 py-3 flex items-center justify-between gap-4">
      <a href="https://digitalkniss.com/" aria-label="DigitalKniss Home">
        <img src="/logo-digital-kniss.png" alt="Digital Kniss" class="audit-logo" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');" />
        <span class="hidden font-bold text-slate-900">DigitalKniss</span>
      </a>
      <a href="https://calendar.app.google/wo43HPW4Be8DQns99/" target="_blank" rel="noopener noreferrer" class="inline-flex items-center rounded-lg px-4 py-2 text-sm font-semibold text-white" style="background: var(--dk-navy);">Book a Strategy Call</a>
    </nav>
  </header>

  <main class="max-w-3xl mx-auto px-4 sm:px-8 py-16 text-center">
    <h1 class="text-3xl font-bold">Travelon Diagnostic Moved</h1>
    <p class="mt-3 text-slate-600">This page now lives inside the unified Travelon dashboard.</p>
    <p class="mt-2 text-sm text-slate-500">Redirecting to the Diagnostic tab...</p>
    <a href="travelon-complete-dashboard.html#diagnostic" class="mt-6 inline-flex items-center rounded-lg px-5 py-3 font-semibold text-white" style="background: var(--dk-primary);">Go now</a>
  </main>

  <script>
    setTimeout(function () {
      window.location.replace('travelon-complete-dashboard.html#diagnostic');
    }, 800);
  </script>
</body>
</html>
